shukhood:
  theme: nord
  banner: true
  repo_root: ~/Developer/shukhood

tools:
  required:
    - git
    - gh
    - curl
    - jq
    - node
    - npm
    - npx
    - python3
    - uv
  optional:
    - hermes
    - codex
    - claude
    - agy
    - opencode
    - vercel
    - supabase
    - wrangler
    - docker
    - psql
    - ffmpeg
    - pyfiglet
    - toilet
    - boxes

secrets:
  mode: local-env
  env_file: ~/.hermes/.env
  example: secrets/.env.example
